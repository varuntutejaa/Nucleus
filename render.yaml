services:
  - type: web
    name: nucleus-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/alerts/raw
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
